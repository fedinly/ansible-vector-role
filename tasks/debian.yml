- name: Vector | Get vector distrib
  ansible.builtin.get_url:
    url: "https://apt.vector.dev/pool/v/ve/{{ item }}_{{ vector_version }}-1_{{ vector_arch }}.deb"
    dest: "./{{ item }}_{{ vector_version }}-1_{{ vector_arch_deb }}.deb"
  with_items: "{{ vector_packages }}"

- name: Vector | Install packages
  become: true
  ansible.builtin.apt:
    deb: vector_{{ vector_version }}-1_{{ vector_arch_deb }}.deb
    #state: present
    #disable_gpg_check: true
- name: Vector | Install config
  become: true
  template:
    src: vector.yml.j2
    dest: vector.yml
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_group_id }}"
    mode: "0644"
    validate:
- name: Vector | Install service
  become: true
  template:
    src: vector.service.j2
    dest: /etc/systemd/system/vector.service
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_group_id }}"
    mode: "0644"
#   notify: Restart vector service
# - name: Flush handlers
#   meta: flush_handlers
- name: Vector | Start service
  become: true
  ansible.builtin.systemd:
    name: vector
    state: started
    daemon_reload: true
    masked: no
